<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{common/head :: commonHead}"></th:block>
    <title>게시글 작성</title>
</head>
<body>
    <div th:replace="~{common/header :: header}"></div>
    <h1>글 작성</h1>
    <form th:action="@{/board/register}" method="post"
    enctype="multipart/form-data">
        <p>재목 : <input type="text" name="title"></p>
        <p>내용 : <textarea name="content" rows="5" cols="30"></textarea></p>
        <p>작성자 : <input type="text" name="writer" th:value="${#authentication.name}" readonly></p>
        <p>첨부파일:
            <input type="file" name="files" multiple>
        </p>
        <button type="submit">저장</button>
        <div th:replace="~{common/header :: header}"></div>
    </form>
    <div th:replace="~{common/footer :: footer}"></div>
</body>
