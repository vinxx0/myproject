<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{common/head :: commonHead}"></th:block>
    <title>글 수정</title>
</head>
<body>
    <div th:replace="~{common/header :: header}"></div>
    <h1>글 수정</h1>
    <form th:action="@{/board/edit}" method="post"
        enctype="multipart/form-data">
        <input type="hidden" name="boardId"
        th:value="${board.boardId}">
        <p>재목 : <input type="text" name="title" th:value="${board.title}"></p>
        <p>내용 : <textarea name="content" rows="5" cols="30" th:text="${board.content}"></textarea></p>
        <p>작성자 : <span th:text="${board.writer}"></span></p>
        <p>첨부파일:
            <input type="file" name="files" multiple>
        </p>
        <button type="submit">수정</button>
    </form>
   <div th:replace="~{common/footer :: footer}"></div>
</body>
